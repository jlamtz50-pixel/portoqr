<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PortoQR — Tu Pase de Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#ffffff;
    min-height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:32px 24px;
    font-family:'Poppins',sans-serif;
  }
  .logo{font-family:'Poppins',sans-serif;font-size:13px;color:#999;letter-spacing:.15em;margin-bottom:24px;}
  .logo span{color:#00c853;}
  .nombre{font-size:22px;font-weight:700;color:#111;margin-bottom:6px;text-align:center;}
  .detalle{font-size:13px;color:#666;margin-bottom:24px;text-align:center;}
  #qr-box{background:#fff;padding:20px;border:2px solid #eee;border-radius:16px;margin-bottom:20px;}
  .expira{font-size:11px;font-family:'Poppins',sans-serif;color:#999;margin-bottom:8px;text-align:center;}
  .instruccion{font-size:12px;color:#aaa;text-align:center;max-width:280px;line-height:1.6;}
  .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Poppins',sans-serif;margin-bottom:16px;}
  .badge-visita{background:#e8f5e9;color:#2e7d32;}
  .badge-permanente{background:#e3f2fd;color:#1565c0;}
  .badge-urgente{background:#fff8e1;color:#e65100;}
  .estado-expirado{color:#f44336;font-size:14px;font-weight:700;text-align:center;margin-top:16px;}
</style>
</head>
<body>

<div class="logo">Porto<span>QR</span></div>

<div class="nombre" id="v-nombre">—</div>
<div class="detalle" id="v-detalle">—</div>
<div class="badge" id="v-badge"></div>

<div id="qr-box">
  <div id="qr-canvas"></div>
</div>

<div class="expira" id="v-expira"></div>
<div class="instruccion">Muestra este código al guardia para registrar tu acceso</div>
<div id="v-error"></div>

<script>
const SB_URL = "https://ghgwegvvawhgzmzjspkl.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoZ3dlZ3Z2YXdoZ3ptempzcGtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODQ3ODAsImV4cCI6MjA4ODE2MDc4MH0.cbR9QXTWqD4XEdPSj1tz7Mzd9MuAg4VmK5T4es4AKP8";

(async function(){
  const params = new URLSearchParams(location.search);
  const code   = params.get("code");
  if (!code) { showError("Código no encontrado"); return; }

  try {
    const r = await fetch(
      `${SB_URL}/rest/v1/invitaciones?codigo_qr=eq.${encodeURIComponent(code)}&select=*`,
      { headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY } }
    );
    const data = await r.json();
    if (!data.length) { showError("Invitación no encontrada"); return; }

    const inv = data[0];

    // Verificar estado
    if (inv.estado === "cancelado") { showError("Esta invitación fue cancelada"); return; }
    if (inv.estado === "expirado")  { showError("Esta invitación ha expirado"); return; }
    if (inv.expira_en && new Date(inv.expira_en) < new Date()) {
      showError("Esta invitación ha expirado"); return;
    }

    // Mostrar datos
    document.getElementById("v-nombre").textContent = inv.nombre_visitante;
    const detalles = [inv.empresa, inv.motivo, inv.placa, inv.color_auto, inv.modelo_auto]
      .filter(Boolean).join(" · ");
    document.getElementById("v-detalle").textContent = detalles || "";

    const badge = document.getElementById("v-badge");
    badge.className = `badge badge-${inv.tipo}`;
    badge.textContent = inv.tipo === "permanente" ? "🔄 Acceso Permanente"
                      : inv.tipo === "urgente"    ? "⚡ Urgente"
                      : "🎫 Visita";

    if (inv.expira_en) {
      const exp = new Date(inv.expira_en);
      document.getElementById("v-expira").textContent =
        "Válido hasta: " + exp.toLocaleString("es-MX", { dateStyle:"short", timeStyle:"short" });
    }

    // Generar QR con la URL de verificación
    const qrUrl = `https://portoqr.netlify.app/qr.html?code=${inv.codigo_qr}`;
    new QRCode(document.getElementById("qr-canvas"), {
      text: qrUrl,
      width: 280,
      height: 280,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

  } catch(e) {
    showError("Error al cargar la invitación");
    console.error(e);
  }
})();

function showError(msg) {
  document.getElementById("qr-box").style.display = "none";
  document.getElementById("v-error").innerHTML =
    `<div class="estado-expirado">⚠️ ${msg}</div>`;
}
</script>
</body>
</html>
